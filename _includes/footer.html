<footer class="site-footer">
  <div class="foot-inner">
    <a class="foot-brand" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/images/brand/candela-logo-1600.png' | relative_url }}" alt="Candela Lighting Lab">
    </a>
    <nav class="foot-nav" aria-label="Footer">
      <a href="{{ '/projects/' | relative_url }}">{% include t.html en="Projects" ko="프로젝트" %}</a>
      <a href="{{ '/expertise/' | relative_url }}">{% include t.html en="Expertise" ko="전문분야" %}</a>
      <a href="{{ '/about/' | relative_url }}">{% include t.html en="About" ko="소개" %}</a>
      <a href="{{ '/contact/' | relative_url }}">{% include t.html en="Contact" ko="연락처" %}</a>
    </nav>
    <a class="foot-mail" href="mailto:{{ site.email }}">{{ site.email }}</a>
  </div>
  <p class="foot-copy">© {{ 'now' | date: "%Y" }} Candela Lighting Lab · Seungjoo Baik</p>
</footer>
