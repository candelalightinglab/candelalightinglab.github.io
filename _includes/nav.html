<header class="site-header">
  <a class="brand" href="{{ '/' | relative_url }}" aria-label="Candela Lighting Lab — Home">
    <img src="{{ '/assets/images/brand/candela-logo-1600.png' | relative_url }}" alt="Candela Lighting Lab" class="brand-logo">
  </a>
  <input type="checkbox" id="nav-toggle" class="nav-toggle" hidden>
  <label for="nav-toggle" class="nav-burger" aria-label="Menu"><span></span><span></span><span></span></label>
  <nav class="site-nav" aria-label="Primary">
    {% assign p = page.url %}
    <a href="{{ '/projects/' | relative_url }}"  {% if p contains '/projects' %}class="is-active"{% endif %}>Projects</a>
    <a href="{{ '/expertise/' | relative_url }}" {% if p contains '/expertise' %}class="is-active"{% endif %}>Expertise</a>
    <a href="{{ '/about/' | relative_url }}"     {% if p contains '/about' %}class="is-active"{% endif %}>About</a>
    <a href="{{ '/contact/' | relative_url }}"   {% if p contains '/contact' %}class="is-active"{% endif %}>Contact</a>
  </nav>
</header>
