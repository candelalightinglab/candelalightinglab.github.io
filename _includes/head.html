<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ffffff">
<script>/* set language before render to avoid flash — default English, remember toggle */(function(){try{var l=localStorage.getItem("cll-lang")||"en";document.documentElement.setAttribute("data-lang",l);}catch(e){document.documentElement.setAttribute("data-lang","en");}})();</script>
{% capture page_title %}{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}{% endcapture %}
<title>{{ page_title }}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
<meta property="og:title" content="{{ page_title }}">
<meta property="og:description" content="{{ site.description }}">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
<link rel="icon" href="{{ '/assets/images/brand/candela-logo-1600.png' | relative_url }}" type="image/png">
