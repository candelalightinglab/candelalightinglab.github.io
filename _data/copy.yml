  intro_ko: "박물관·전시·건축·조경 조명 — 국내 최신작과 뉴욕(CBB) 시절의 과거작을 함께 소개합니다."

about:
  kicker: "Candela Lighting · Seungjoo Baik"
  kicker_ko: "캔델라 라이팅 · 백승주"
  intro: "Candela Lighting Lab designs lighting for architecture, museums and exhibitions. Light is kept restrained, so that objects and spaces speak for themselves."
  intro_ko: "캔델라 라이팅 랩은 건축·박물관·전시 공간의 빛을 디자인합니다. 빛은 절제되어, 사물과 공간이 스스로 말하게 합니다."
  lede: "Candela Lighting Lab designs lighting for architecture, museums and exhibitions — led by **Seungjoo Baik**, Architectural Lighting Designer. Seungjoo trained at Parsons School of Design (MFA in Lighting) and practiced in New York with Cline Bettridge Bernstein Lighting Design before founding the studio in Seoul."
  lede_ko: "캔델라 라이팅 랩은 건축·박물관·전시 공간의 빛을 디자인합니다 — **백승주** 소장(건축조명 디자이너)이 이끕니다. 파슨스디자인스쿨에서 조명 석사(MFA)를 마치고, 뉴욕 Cline Bettridge Bernstein Lighting Design에서 실무를 거친 뒤 서울에 스튜디오를 열었습니다."

expertise:
  kicker: "Scope of Work"
  kicker_ko: "업무 범위"
  intro: "Architectural, museum and exhibition lighting, and lighting consulting. We define target illuminance, colour temperature and colour rendering precisely, and design light suited to the character of each space."
  intro_ko: "건축조명 · 박물관/전시조명 · 라이팅 컨설팅. 목표 조도·색온도·연색성을 정밀하게 정의하고, 공간의 성격에 맞는 빛을 설계합니다."
  philosophy_sub: "Design Philosophy"
  philosophy_sub_ko: "디자인 철학"
  process_sub: "Lighting Design Process"
  process_sub_ko: "조명설계 과정"
  process_intro: "Every project moves through four stages — from setting target illuminance and direction, to on-site aiming — treating light as a material to be measured and calculated."
  process_intro_ko: "모든 프로젝트는 네 단계로 진행됩니다 — 타겟 조도와 연출 방향 설정에서 현장 에이밍까지, 빛을 측정하고 계산하는 물질로 다룹니다."
  # ── Approach / 접근 (전시조명디자이너의 일과 세계 기반) ──
  approach_kicker: "Approach"
  approach_kicker_ko: "접근"
  approach_lead: "Lighting is a supporter of the work. It answers the needs of the artist, the curator and the exhibition — and, drawing on current technology, maximises the intrinsic value of each piece while making the character of the exhibition clear."
  approach_lead_ko: "조명은 작품을 위한 서포터입니다. 작가와 학예사, 전시기획의 요구에 부합하고, 최신 기술을 반영해 작품 본연의 가치를 극대화하며 전시의 성격을 명확히 하는 것 — 그것이 조명의 역할입니다."
  p1_t: "Light for art"
  p1_t_ko: "예술을 위한 빛"
  p1_b: "Serving the work and the people who shape the exhibition — a supporting role, held quietly."
  p1_b_ko: "작품과, 전시를 만드는 사람들을 위한 서포터로서의 역할. 조용히 뒤를 받칩니다."
  p2_t: "Light as material"
  p2_t_ko: "물질로서의 빛"
  p2_b: "A rigorous process — from target illuminance and 3D simulation to construction documents and on-site aiming."
  p2_b_ko: "타겟 조도와 3D 시뮬레이션부터 실시설계와 현장 에이밍까지, 철저하게 계산되는 설계 과정."
  p3_t: "Light that gives experience"
  p3_t_ko: "경험을 선사하는 빛"
  p3_b: "Art and science together. The difference in detail, made by time and care, is the difference in experience."
  p3_b_ko: "예술과 과학의 결합. 시간과 정성이 만든 디테일의 차이가 곧 경험의 차이입니다."
  sim_heading: "Calculation & simulation"
  sim_heading_ko: "조도 계산 · 시뮬레이션"
  sim_body: "Target illuminance, colour temperature and colour rendering (CRI) are defined in advance and verified with 3D illuminance simulation."
  sim_body_ko: "목표 조도·색온도·연색성(CRI)을 사전에 정의하고 3D 조도 시뮬레이션으로 검증합니다."

