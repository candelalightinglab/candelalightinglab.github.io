---
layout: default
---
{% assign pr = site.data.projects | where: "slug", page.slug | first %}
<article class="project">
  <section class="project-hero" style="--cover: url('{{ '/assets/images/projects/' | append: pr.slug | append: '/' | append: pr.cover | relative_url }}')">
    <div class="project-hero-inner">
      <p class="eyebrow">{{ pr.category }} · {{ pr.location }}</p>
      <h1>{{ pr.title_en }}</h1>
      <p class="project-krtitle">{{ pr.title_kr }}</p>
    </div>
  </section>

  <div class="wrap project-intro">
    <p class="lede">{{ pr.blurb }}</p>
    <a class="back-link" href="{{ '/projects/' | relative_url }}">← All projects</a>
  </div>

  <section class="gallery wrap">
    {% for img in pr.images %}
    <figure class="gallery-item">
      <img loading="lazy" src="{{ '/assets/images/projects/' | append: pr.slug | append: '/' | append: img | relative_url }}"
           alt="{{ pr.title_en }} — lighting {{ forloop.index }}">
    </figure>
    {% endfor %}
  </section>

  <nav class="project-foot wrap">
    <a class="back-link" href="{{ '/projects/' | relative_url }}">← Back to all projects</a>
  </nav>
</article>
