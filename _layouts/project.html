<!doctype html>
<html lang="{{ site.lang }}">
<head>
  {% include head.html %}
</head>
<body>
  {% include nav.html %}
  <main id="main">
    <article class="project">
      <header class="proj-head wrap">
        <span class="kicker">{{ page.category }} · {{ page.location }}</span>
        <h1>{{ page.title }}</h1>
        <div class="lede">{{ content }}</div>
      </header>

      <section class="proj-figs wrap">
        {% for img in page.images %}
        <figure class="full reveal">
          <img loading="lazy" src="{{ '/assets/images/projects/' | append: page.slug | append: '/' | append: img | relative_url }}"
               alt="{{ page.title }} — lighting {{ forloop.index }}">
        </figure>
        {% endfor %}
      </section>

      <nav class="proj-nav">
        <a class="back-link" href="{{ '/projects/' | relative_url }}">← All projects</a>
      </nav>
    </article>
  </main>
  {% include footer.html %}
  <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
</body>
</html>
